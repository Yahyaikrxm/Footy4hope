<section class = "register-section">
<h1 class="register-h">Register for the Tournament</h1>

<iframe data-tally-src="https://tally.so/embed/pbLX8q?alignLeft=1&hideTitle=1&transparentBackground=1&dynamicHeight=1" loading="lazy" width="100%" height="2060" frameborder="0" marginheight="0" marginwidth="0" title="Registration Form"></iframe>
<script>var d=document,w="https://tally.so/widgets/embed.js",v=function(){"undefined"!=typeof Tally?Tally.loadEmbeds():d.querySelectorAll("iframe[data-tally-src]:not([src])").forEach((function(e){e.src=e.dataset.tallySrc}))};if("undefined"!=typeof Tally)v();else if(d.querySelector('script[src="'+w+'"]')==null){var s=d.createElement("script");s.src=w,s.onload=v,s.onerror=v,d.body.appendChild(s);}</script>
</section>

  <script>
    (function() {
      var hamburger = document.querySelector('.nav-hamburger');
      var menu = document.getElementById('nav-menu');
      var links = menu.querySelectorAll('a');

      function openMenu() {
        menu.classList.add('nav-menu-open');
        menu.setAttribute('aria-hidden', 'false');
        hamburger.setAttribute('aria-expanded', 'true');
        hamburger.setAttribute('aria-label', 'Close menu');
      }

      function closeMenu() {
        menu.classList.remove('nav-menu-open');
        menu.setAttribute('aria-hidden', 'true');
        hamburger.setAttribute('aria-expanded', 'false');
        hamburger.setAttribute('aria-label', 'Open menu');
      }

      hamburger.addEventListener('click', function() {
        if (menu.classList.contains('nav-menu-open')) {
          closeMenu();
        } else {
          openMenu();
        }
      });

      links.forEach(function(link) {
        link.addEventListener('click', closeMenu);
      });
    })();
  </script>
